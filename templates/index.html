<!DOCTYPE html>
<html>
<head>
<title>XFull</title>
<style>
body {
    background-image: url("{{ url_for('static', filename='background.png') }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
    margin: 0;
    font-family: 'Bahnschrift', Arial, sans-serif;
    color: white;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    display: flex;
    gap: 50px;
    flex-wrap: wrap;
}

.box {
    background: rgba(0,0,50,0.6);
    padding: 30px;
    border-radius: 15px;
    min-width: 250px;
    border: 2px solid black;
}

input {
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
    border: 2px solid black;
    width: 100%;
    box-sizing: border-box;
    font-family: 'Bahnschrift', Arial, sans-serif;
}

button {
    padding: 10px 20px;
    background: #3a7bff;
    border: 2px solid black;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
    font-family: 'Bahnschrift', Arial, sans-serif;
}

h2 { margin-bottom: 15px; }
.error { color: red; font-weight: bold; }
.logo { position: absolute; top: 20px; left: 20px; }
</style>
</head>
<body>

<img src="{{ url_for('static', filename='logo.png') }}" width="120" class="logo">

<div class="container">
    <!-- LOGIN FORM -->
    <div class="box">
        <h2>Login</h2>
        {% if error_login %}<p class="error">{{ error_login }}</p>{% endif %}
        <form method="POST" action="/">
            <input type="text" name="login_username" placeholder="Username" required>
            <input type="password" name="login_password" placeholder="Password" required>
            <button type="submit" name="login">Login</button>
        </form>
    </div>

    <!-- REGISTER FORM -->
    <div class="box">
        <h2>Register</h2>
        {% if error_register %}<p class="error">{{ error_register }}</p>{% endif %}
        <form method="POST" action="/">
            <input type="text" name="register_username" placeholder="Username" required>
            <input type="password" name="register_password" placeholder="Password" required>
            <button type="submit" name="register">Create Account</button>
        </form>
    </div>
</div>

</body>
</html>
